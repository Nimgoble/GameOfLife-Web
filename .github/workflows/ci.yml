name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: List test files
        run: ls -R tests || dir tests

      - name: Print working directory
        run: pwd

      - name: Print Vitest version
        run: npx vitest --version

      - name: Show vite.config.ts contents
        run: cat vite.config.ts

      - name: Run Vitest on a single test file
        run: VITE_CJS_IGNORE_WARNING=true npx vitest run --reporter=verbose tests/BoardPlayback.test.tsx

      - name: Test
        run: VITE_CJS_IGNORE_WARNING=true npx vitest run --reporter=verbose
