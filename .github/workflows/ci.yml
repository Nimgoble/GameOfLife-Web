name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install
        run: npm ci
        working-directory: ./GameOfLife-Web

      - name: Build
        run: npm run build
        working-directory: ./GameOfLife-Web

      - name: Test
        run: npm test --silent
        working-directory: ./GameOfLife-Web
